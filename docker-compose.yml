# Explicit project name -- without this, Compose derives it from the
# directory name, which docker-compose.prod.yml (same directory) also
# does. Two files with the same implicit project name but different
# explicit network names caused `docker compose -f docker-compose.prod.yml
# up -d` to treat this file's running containers as "orphans" of its own
# project and attempt to reconcile/tear down alverkardes_dev's network on
# every prod up/down cycle -- observed repeatedly as transient
# "container ... is not connected to the network alverkardes_dev" errors.
# See WIKI_ROOT/07-Issues-Risks/Production-Hardening-Bulguları.md.
name: alverkardes-dev

services:
  db:
    image: postgres:16
    container_name: aici-db
    environment:
      POSTGRES_DB: aici
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aici_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aici-redis
    ports:
      - "6379:6379"

volumes:
  aici_pgdata:
    # Pinned to the volume's existing physical name (created back when the
    # implicit project name was "alverkardes") so the explicit `name:`
    # above doesn't orphan it into a new, empty volume.
    name: alverkardes_aici_pgdata

networks:
  default:
    # Explicit, isolated network name. Without this, Compose derives the
    # network name from the directory name, which collided with
    # docker-compose.prod.yml's network (same directory -> same default
    # project name -> same network) and, worse, both files' postgres
    # services ended up registering the SAME DNS alias "aici-db"
    # (this file's container_name, and the prod file's service key) on
    # that shared network. Docker's embedded DNS then resolved "aici-db"
    # non-deterministically between the two different Postgres containers
    # (different passwords), causing intermittent
    # asyncpg.exceptions.InvalidPasswordError in the prod API container.
    # See WIKI_ROOT/07-Issues-Risks/Production-Hardening-Bulguları.md (OPS-002).
    name: alverkardes_dev