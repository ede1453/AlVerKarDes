# Explicit project name -- see docker-compose.yml for the full incident
# this fixes (dev/prod compose files sharing an implicit project name
# caused repeated cross-stack orphan-container/network reconciliation
# errors on every `up`/`down`).
name: alverkardes-prod

services:
  aici-api:
    build:
      context: .
      # LAUNCH-001: this used to be the root, unhardened `Dockerfile` (root
      # user, single worker, no healthcheck) while a hardened one
      # (non-root, 2 workers, healthcheck) sat unused in deploy/ since the
      # project's first commit, only ever smoke-tested by CI, never
      # actually deployed -- the exact "known-good code path that's never
      # actually wired in" shape as the evaluate_authorization() decoy
      # (AUTH-000/ADR-002). This is now the canonical Dockerfile.
      dockerfile: deploy/docker/Dockerfile.production
    container_name: aici-api-prod
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    depends_on:
      aici-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  aici-db:
    image: postgres:16
    container_name: aici-db-prod
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: aici
      POSTGRES_USER: postgres
      # LAUNCH-001: was a hardcoded placeholder ("12345678") -- must match
      # .env.prod's DATABASE_URL password exactly, since this is the same
      # Postgres instance. See enforce_db_password_strength() (app/main.py).
      POSTGRES_PASSWORD: pFO5QQpn9P4egIjMYSq595Ecv-YTd3uT9j0GHukzMbU
    ports:
      - "5433:5432"
    volumes:
      - aici_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aici"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: aici-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aici_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  aici_postgres_prod_data:
    # Pinned to the volume's existing physical name (see docker-compose.yml
    # for the full incident) so the explicit `name:` above doesn't orphan
    # it into a new, empty volume -- this exact mistake happened once
    # already during a temporary `-p` workaround before this fix existed.
    name: alverkardes_aici_postgres_prod_data
  aici_redis_prod_data:
    name: alverkardes_aici_redis_prod_data

networks:
  default:
    # Explicit, isolated network name -- see docker-compose.yml for why this
    # matters. Without it, this stack shared a network + DNS alias ("aici-db",
    # and also "redis") with the dev stack's Postgres/Redis, causing
    # nondeterministic cross-container DNS resolution.
    name: alverkardes_prod